name: Deploy Games to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            muju/package-lock.json
            forge/package-lock.json
            oracle/package-lock.json

      - name: Install Muju dependencies
        working-directory: ./muju
        run: npm ci

      - name: Build Muju
        working-directory: ./muju
        run: npm run build

      - name: Install Forge dependencies
        working-directory: ./forge
        run: npm ci

      - name: Build Forge
        working-directory: ./forge
        run: npm run build

      - name: Install Oracle dependencies
        working-directory: ./oracle
        run: npm ci

      - name: Build Oracle
        working-directory: ./oracle
        run: npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp index.html _site/
          cp CNAME _site/
          touch _site/.nojekyll
          cp -r muju/dist _site/muju
          cp -r forge/dist _site/forge
          cp -r oracle/dist _site/oracle

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
